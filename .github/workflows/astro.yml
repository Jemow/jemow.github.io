name: Deploy to A2 Hosting

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Debug SSH connection
        run: |
          echo "${{ secrets.A2_SSH_KEY }}" > /tmp/debug_key
          chmod 600 /tmp/debug_key
          ssh -vvv -i /tmp/debug_key -o StrictHostKeyChecking=no ${{ secrets.A2_USER }}@${{ secrets.A2_HOST }} echo "SSH OK" || true
          rm /tmp/debug_key

      - name: Deploy via rsync
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avzr --delete
          path: dist/
          remote_path: ${{ secrets.A2_PATH }}
          remote_host: ${{ secrets.A2_HOST }}
          remote_user: ${{ secrets.A2_USER }}
          remote_key: ${{ secrets.A2_SSH_KEY }}
