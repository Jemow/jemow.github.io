name: Deploy to A2 Hosting

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.A2_HOST }}
          username: ${{ secrets.A2_USER }}
          password: ${{ secrets.A2_FTP_PASSWORD }}
          local-dir: dist/
          server-dir: /public_html/
